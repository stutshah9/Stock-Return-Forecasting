data:
  min_chunk_size: 256
  max_chunk_size: 512
  chunk_size: 256
  max_chunks: 16
  universe: sp500
  split:
    strategy: year
    validation_years: [2023]
    calibration_years: [2024]
    test_years: [2025]
    allow_synthetic_fallback: false

model:
  embed_dim: 128
  dropout: 0.1

training:
  device: cuda
  seed: 42
  lr: 5e-5
  batch_size: 32
  epochs: 50
  patience: 10
  use_amp: true
  pinball_quantiles: [0.025, 0.05, 0.10, 0.50, 0.90, 0.95, 0.975]
  point_loss_weight: 1.0
  point_loss_beta: 0.02
  direction_loss_weight: 0.05
  early_stop_metric: val_rmse
  grad_clip_norm: 1.0
  uncertainty_alignment_weight: 0.05
  confidence_calibration_weight: 0.0
  attention_alignment_weight: 0.0
  explanation_alignment_weight: 0.0

calibration:
  coverage_levels: [0.80, 0.90, 0.95]
  regime_fit_quantiles:
    low_surprise: 0.60
    high_surprise: 0.90
    high_vol: 0.60
  selective_min_scores: [0.55, 0.70, 0.85]

evaluation:
  include_selective_analysis: false
