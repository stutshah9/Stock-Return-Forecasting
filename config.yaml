data:
  min_chunk_size: 256
  max_chunk_size: 512
  chunk_size: 256
  max_chunks: 16
  universe: sp500
  split:
    strategy: year
    calibration_years: [2024]
    test_years: [2025]
    allow_synthetic_fallback: false

model:
  embed_dim: 64
  dropout: 0.1

training:
  device: cuda
  lr: 1e-4
  batch_size: 32
  epochs: 30

calibration:
  coverage_levels: [0.80, 0.90, 0.95]
